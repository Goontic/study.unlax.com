name: study-unlax

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: study_unlax
      POSTGRES_USER: study_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_user -d study_unlax"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.dev.Dockerfile
    restart: unless-stopped
    env_file:
      - docker/.env.frontend
    environment:
      # Docker 内部ネットワーク経由で postgres に接続
      DATABASE_URL: postgresql://study_user:dev_password@postgres:5432/study_unlax?schema=public
    ports:
      - "3000:3000"
    volumes:
      # ソースコードのみマウント（node_modules はイメージ内のものを使用）
      - ./frontend/app:/app/frontend/app
      - ./frontend/components:/app/frontend/components
      - ./frontend/lib:/app/frontend/lib
      - ./frontend/public:/app/frontend/public
      - ./frontend/prisma:/app/frontend/prisma
      - ./frontend/prisma.config.ts:/app/frontend/prisma.config.ts
      - ./docker/entrypoint.frontend.sh:/app/docker/entrypoint.frontend.sh
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
