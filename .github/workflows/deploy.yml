name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CLOUDFLARE_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Backend ---
      - name: Generate Prisma client & Build backend
        run: |
          pnpm prisma:generate
          pnpm build
        working-directory: backend

      # --- Frontend ---
      - name: Build frontend
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

      - name: Prepare frontend standalone
        run: |
          cp -r frontend/.next/static frontend/.next/standalone/.next/
          [ -d frontend/public ] && cp -r frontend/public frontend/.next/standalone/ || true
          rm -rf frontend/.next/standalone/.next/cache/

      # --- SSH via Cloudflare Tunnel ---
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << 'EOF'
          Host ${{ vars.SERVER_HOST }}
            ProxyCommand cloudflared access ssh --hostname %h
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      # --- Transfer ---
      - name: Create server directories
        run: |
          ssh ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} \
            "mkdir -p \
              ${{ vars.SERVER_PATH }}/backend/dist \
              ${{ vars.SERVER_PATH }}/backend/prisma \
              ${{ vars.SERVER_PATH }}/frontend/.next/standalone"

      - name: Verify backend build
        run: |
          if [ ! -f backend/dist/main.js ]; then
            echo "ERROR: backend/dist/main.js not found"
            exit 1
          fi

      - name: Transfer backend build
        run: |
          rsync -az --delete \
            backend/dist/ \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:${{ vars.SERVER_PATH }}/backend/dist/
          rsync -az \
            backend/package.json \
            backend/prisma.config.ts \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:${{ vars.SERVER_PATH }}/backend/
          rsync -az --delete \
            backend/prisma/ \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:${{ vars.SERVER_PATH }}/backend/prisma/

      - name: Transfer frontend standalone
        run: |
          rsync -az --delete \
            frontend/.next/standalone/ \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:${{ vars.SERVER_PATH }}/frontend/.next/standalone/

      - name: Transfer frontend start script
        run: |
          rsync -az \
            frontend/start.sh \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:${{ vars.SERVER_PATH }}/frontend/

      - name: Transfer root config
        run: |
          rsync -az \
            ecosystem.config.js \
            ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }}:${{ vars.SERVER_PATH }}/

      # --- Reload ---
      - name: Install prod deps, migrate DB, reload PM2
        run: |
          ssh ${{ vars.SERVER_USER }}@${{ vars.SERVER_HOST }} "
            set -e
            cd ${{ vars.SERVER_PATH }}/backend
            npm install
            npx prisma migrate deploy
            cd ${{ vars.SERVER_PATH }}
            pm2 startOrRestart ecosystem.config.js --update-env
            pm2 save
          "
